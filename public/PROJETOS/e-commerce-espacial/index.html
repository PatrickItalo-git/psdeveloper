<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula Shop - O Futuro do Comércio Espacial</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="stars"></div>
    <div id="stars2"></div>
    <div id="stars3"></div>

    <nav class="navbar">
        <div class="logo">NEBULA<span>SHOP</span></div>
        <div class="search-bar">
            <i data-lucide="search"></i>
            <input type="text" placeholder="Buscar tecnologia galáctica...">
        </div>
        <div class="nav-icons">
            <i data-lucide="shopping-cart"></i>
            <i data-lucide="user"></i>
        </div>
    </nav>

    <main>
        <div class="hero">
            <div class="hero-left">
                <span class="badge">NOVA ERA</span>
                <h1>MODA <span>INTERGALÁCTICA</span> DISPONÍVEL AGORA.</h1>
                <p>Eles vieram de longe. O estilo que transcende as dimensões chegou ao seu sistema solar.</p>
                <div class="price-hero">
                    <span class="currency">Ξ</span>
                    <span class="value">0.45</span>
                    <button class="buy-btn">COMPRAR AGORA <i data-lucide="arrow-right"></i></button>
                </div>
            </div>
            <div class="hero-right">
                <div class="hologram">
                    <img src="hero.png" alt="NFT Space Fashion">
                    <div class="scan-line"></div>
                </div>
            </div>
        </div>

        <section class="products">
            <h2>HOLOGRAFIA DOS PRODUTOS</h2>
            <div class="product-grid">
                <div class="product-card">
                    <div class="img-box">
                        <img src="hero.png" alt="Pulseira Estelar">
                    </div>
                    <h3>Pulseira Quântica</h3>
                    <p>Sincronização temporal em tempo real.</p>
                    <div class="price">R$ 4.500</div>
                </div>
                <!-- More cards can go here -->
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
